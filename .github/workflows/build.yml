name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.0'
      - run: flutter create --platforms=android --org com.slaglab .
      - name: Patch sdk + app name + VPN permissions
        run: |
          for f in android/app/build.gradle.kts android/app/build.gradle; do
            [ -f "$f" ] && sed -i 's/flutter.minSdkVersion/24/g; s/flutter.targetSdkVersion/33/g' "$f"
          done
          MF=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="[^"]*"/android:label="VPNChina"/' "$MF"
          sed -i 's#<manifest\(.*\)>#<manifest\1><uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE_SYSTEM_EXEMPTED"/><uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>#' "$MF"
          echo "===== AndroidManifest.xml ====="; cat "$MF"
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: vpnchina-apk
          path: build/app/outputs/flutter-apk/*.apk
